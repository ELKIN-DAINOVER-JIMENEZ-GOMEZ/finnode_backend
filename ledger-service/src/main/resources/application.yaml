# Configuración base para ledger-service
spring:
  application:
    name: ledger-service

  # ── BASE DE DATOS ──────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5534}/${DB_NAME:ledger_db}
    username: ${DB_USERNAME:ledger_user}
    password: ${DB_PASSWORD:Dainover}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: LedgerHikariPool
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / HIBERNATE ────────────────────────────────────────────────────────
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}   # 'validate' en prod, 'update' en dev (por defecto cambiado a 'update' para desarrollo local)
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  # ── KAFKA ──────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:ledger-service-group}
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: com.finnode.ledger
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      concurrency: 3

  # ── SECURITY: Resource Server JWT (usar la clave pública del auth-service)
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8081/.well-known/jwks.json}

# ── SERVIDOR ────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8084}

# ── LOGGING ─────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.finnode.ledger: DEBUG

# ── FINNODE ──────────────────────────────────────────────────────────────────
finnode:
  env: ${FINNODE_ENV:local}