version: '3.8'

services:
  # ==========================================================================
  # Base de datos PostgreSQL compartida
  # ==========================================================================
  postgres:
    build:
      context: ./postgres-init
      dockerfile: Dockerfile
    container_name: finnode-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    ports:
      - "5599:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - finnode-network

  # ==========================================================================
  # Apache Kafka - Message Broker de eventos entre servicios
  # ==========================================================================
  kafka:
    image: redpandadata/redpanda:latest
    container_name: finnode-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: [ "CMD-SHELL", "rpk cluster health --brokers kafka:9092 >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - finnode-network

  # ==========================================================================
  # Auth Service - Servicio de autorización y autenticación (Puerto 8081)
  # ==========================================================================
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      # Configuración de BD PostgreSQL
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: auth_user
      DB_PASSWORD: Dainover
      KAFKA_BROKER: kafka:9092
      SERVER_PORT: 8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8081"
    networks:
      - finnode-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'cat < /dev/null > /dev/tcp/localhost/8081' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ==========================================================================
  # Account Service - Servicio de cuentas de usuario (Puerto 8082)
  # ==========================================================================
  account-service:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    container_name: account-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      auth-service:
        condition: service_healthy
    environment:
      # Configuración de BD PostgreSQL
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: account_db
      DB_USER: account_user
      DB_PASSWORD: Dainover
      KAFKA_BROKER: kafka:9092
      JWT_ISSUER_URI: http://auth-service:8081
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    networks:
      - finnode-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'cat < /dev/null > /dev/tcp/localhost/8082' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ==========================================================================
  # Ledger Service - Servicio de registros de transacciones (Puerto 8084)
  # ==========================================================================
  ledger-service:
    build:
      context: ./ledger-service
      dockerfile: Dockerfile
    container_name: ledger-service
    depends_on:
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8084
      FINNODE_ENV: docker
      # Configuración de BD compartida (usar el servicio 'postgres' de este compose)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ledger_db
      DB_USER: ledger_user
      DB_PASSWORD: Dainover
      # URL del JWK del auth-service para que Spring cree el JwtDecoder automáticamente
      JWT_JWK_SET_URI: http://auth-service:8081/.well-known/jwks.json
    ports:
      - "8084:8084"
    networks:
      - finnode-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'cat < /dev/null > /dev/tcp/localhost/8084' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ==========================================================================
  # Payment Orchestrator - Servicio de orquestación de pagos (Puerto 8083)
  # ==========================================================================
  payment-orchestrator:
    build:
      context: ./payment-orchestrator
      dockerfile: Dockerfile
    container_name: payment-orchestrator
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      auth-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
    environment:
      # Configuración de BD PostgreSQL
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: payment_db
      DB_USER: payment_user
      DB_PASSWORD: Dainover
      KAFKA_BROKER: kafka:9092
      JWT_ISSUER_URI: http://auth-service:8081
      JWT_JWK_SET_URI: http://auth-service:8081/.well-known/jwks.json
      ACCOUNT_SERVICE_URL: http://account-service:8082
      SERVER_PORT: 8083
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-demo-key}
      DB_URL: jdbc:postgresql://postgres:5432/payment_db
      DB_USERNAME: payment_user
    ports:
      - "8083:8083"
    networks:
      - finnode-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'cat < /dev/null > /dev/tcp/localhost/8083' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ==========================================================================
  # API Gateway - Puerta de entrada a todos los servicios (Puerto 8080)
  # ==========================================================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      auth-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
      payment-orchestrator:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      JWT_ISSUER_URI: http://auth-service:8081
      JWT_JWK_SET_URI: http://auth-service:8081/.well-known/jwks.json
      AUTH_SERVICE_URL: http://auth-service:8081
      ACCOUNT_SERVICE_URL: http://account-service:8082
      PAYMENT_ORCHESTRATOR_URL: http://payment-orchestrator:8083
      LEDGER_SERVICE_URL: http://ledger-service:8084
    ports:
      - "8080:8080"
    networks:
      - finnode-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'cat < /dev/null > /dev/tcp/localhost/8080' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

# =============================================================================
# Redes y Volúmenes
# =============================================================================
networks:
  finnode-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local

