version: '3.8'

services:
  # ==========================================================================
  # Base de datos PostgreSQL compartida
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: finnode-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    ports:
      - "5532:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - finnode-network

  # ==========================================================================
  # Apache Kafka - Message Broker de eventos entre servicios
  # ==========================================================================
  kafka:
    image: bitnami/kafka:3.7
    container_name: finnode-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server kafka:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finnode-network

  # ==========================================================================
  # Auth Service - Servicio de autorización y autenticación (Puerto 8081)
  # ==========================================================================
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      # Configuración de BD PostgreSQL
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: auth_user
      DB_PASSWORD: Dainover
      KAFKA_BROKER: kafka:9092
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    networks:
      - finnode-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ==========================================================================
  # Account Service - Servicio de cuentas de usuario (Puerto 8082)
  # ==========================================================================
  account-service:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    container_name: account-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      auth-service:
        condition: service_healthy
    environment:
      # Configuración de BD PostgreSQL
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: account_db
      DB_USER: account_user
      DB_PASSWORD: Dainover
      KAFKA_BROKER: kafka:9092
      JWT_ISSUER_URI: http://auth-service:8081
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    networks:
      - finnode-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ==========================================================================
  # Ledger Service - Servicio de registros de transacciones (Puerto 8084)
  # ==========================================================================
  ledger-service:
    build:
      context: ./ledger-service
      dockerfile: Dockerfile
    container_name: ledger-service
    depends_on:
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8084
      FINNODE_ENV: docker
    ports:
      - "8084:8084"
    networks:
      - finnode-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ==========================================================================
  # Payment Orchestrator - Servicio de orquestación de pagos (Puerto 8083)
  # ==========================================================================
  payment-orchestrator:
    build:
      context: ./payment-orchestrator
      dockerfile: Dockerfile
    container_name: payment-orchestrator
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      auth-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
    environment:
      # Configuración de BD PostgreSQL
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: payment_db
      DB_USER: payment_user
      DB_PASSWORD: Dainover
      KAFKA_BROKER: kafka:9092
      JWT_ISSUER_URI: http://auth-service:8081
      JWT_JWK_SET_URI: http://auth-service:8081/.well-known/jwks.json
      ACCOUNT_SERVICE_URL: http://account-service:8082
      SERVER_PORT: 8083
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-demo-key}
    ports:
      - "8083:8083"
    networks:
      - finnode-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ==========================================================================
  # API Gateway - Puerta de entrada a todos los servicios (Puerto 8080)
  # ==========================================================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      auth-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
      payment-orchestrator:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      JWT_ISSUER_URI: http://auth-service:8081
      JWT_JWK_SET_URI: http://auth-service:8081/.well-known/jwks.json
      AUTH_SERVICE_URL: http://auth-service:8081
      ACCOUNT_SERVICE_URL: http://account-service:8082
      PAYMENT_ORCHESTRATOR_URL: http://payment-orchestrator:8083
      LEDGER_SERVICE_URL: http://ledger-service:8084
    ports:
      - "8080:8080"
    networks:
      - finnode-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

# =============================================================================
# Redes y Volúmenes
# =============================================================================
networks:
  finnode-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local

