services:
  account-db:
    image: postgres:16-alpine
    container_name: account-db
    environment:
      POSTGRES_DB: account_db
      POSTGRES_USER: account_user
      POSTGRES_PASSWORD: Dainover
    ports:
      - "5532:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U account_user -d account_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - account-db-data:/var/lib/postgresql/data

  kafka:
    image: redpandadata/redpanda:latest
    container_name: kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --brokers kafka:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  account-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: account-service
    depends_on:
      account-db:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DB_HOST: account-db
      DB_PORT: 5432
      DB_NAME: account_db
      DB_USER: account_user
      DB_PASSWORD: Dainover
      KAFKA_BROKER: kafka:9092
      JWT_ISSUER_URI: ${JWT_ISSUER_URI:-http://host.docker.internal:8081}
      SERVER_PORT: 8082
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:8082"

volumes:
  account-db-data:

