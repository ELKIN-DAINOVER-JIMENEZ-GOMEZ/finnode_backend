spring:
  datasource:
    url: jdbc:h2:mem:account_test_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

  security:
    oauth2:
      resourceserver:
        jwt:
          # Evita resolución remota del issuer durante contextLoads
          jwk-set-uri: http://localhost:9999/mock-jwks

server:
  port: 0


